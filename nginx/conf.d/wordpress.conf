upstream php-fpm {
    server wordpress:9000;
}

server {
    listen 80;
    server_name _;

    root /var/www/html;
    index index.php index.html;

    # ── Health check endpoint (used by HEALTHCHECK) ──
    location = /nginx-health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # ── Security headers ──
    # (SSL/HSTS handled by upstream proxy)
    add_header X-Content-Type-Options  "nosniff"             always;
    add_header X-Frame-Options         "SAMEORIGIN"          always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

    # ── Block access to hidden files (.htaccess, .git, etc.) ──
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Block access to sensitive WP files ──
    location ~* /(?:wp-config\.php|readme\.html|license\.txt|wp-cli\.yml) {
        deny all;
    }

    # ── Block XML-RPC (common brute-force / DDoS vector) ──
    location = /xmlrpc.php {
        limit_req zone=wp_xmlrpc burst=2 nodelay;
        include fastcgi_params;
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # ── Rate-limit wp-login.php ──
    location = /wp-login.php {
        limit_req zone=wp_login burst=3 nodelay;
        include fastcgi_params;
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # ── Disable PHP execution in uploads (prevent malicious uploads) ──
    location ~* /wp-content/uploads/.*\.php$ {
        deny all;
    }

    # ── Disable PHP execution in wp-includes ──
    location ~* /wp-includes/.*\.php$ {
        deny all;
    }

    # ── Static assets: long cache, skip logging ──
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?|ttf|eot|otf|mp4|webm)$ {
        expires    30d;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # ── WordPress pretty permalinks ──
    location / {
        limit_req zone=general burst=20 nodelay;
        try_files $uri $uri/ /index.php?$args;
    }

    # ── PHP handling via FPM ──
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        fastcgi_pass  php-fpm;
        fastcgi_index index.php;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;

        # Timeouts matching PHP max_execution_time
        fastcgi_read_timeout    300s;
        fastcgi_send_timeout    300s;
        fastcgi_connect_timeout 60s;

        # Buffer tuning
        fastcgi_buffers         16 16k;
        fastcgi_buffer_size     32k;
    }

    # ── Deny access to any .sql or backup files ──
    location ~* \.(sql|bak|orig|old|save)$ {
        deny all;
    }
}
